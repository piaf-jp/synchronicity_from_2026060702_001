    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const GOGYO = { 1: "水", 2: "土", 3: "木", 4: "木", 5: "土", 6: "金", 7: "金", 8: "土", 9: "火" };
        const MIYA_INFO = {
            1: { name: "坎宮", score: 1 }, 2: { name: "坤宮", score: 3 }, 3: { name: "震宮", score: 5 },
            4: { name: "巽宮", score: 7 }, 5: { name: "中宮", score: 9 }, 6: { name: "乾宮", score: 10 },
            7: { name: "兌宮", score: 8 }, 8: { name: "艮宮", score: 5 }, 9: { name: "離宮", score: 3 }
        };
        const STAR_NAMES = {
            1: "一白水星", 2: "二黒土星", 3: "三碧木星", 4: "四緑木星", 5: "五黄土星", 
            6: "六白金星", 7: "七赤金星", 8: "八白土星", 9: "九紫火星"
        };

        // 五行の関係性（体感）を判定
        function getGogyoRelation(meiNum, aiteNum) {
            const mei = GOGYO[meiNum];
            const aite = GOGYO[aiteNum];
            if (mei === aite) return { relation: "比和", feeling: "同調（マイペース）" };
            
            const isSei = (from, to) => (from==="木"&&to==="火") || (from==="火"&&to==="土") || (from==="土"&&to==="金") || (from==="金"&&to==="水") || (from==="水"&&to==="木");
            if (isSei(aite, mei)) return { relation: "生気", feeling: "追い風（乗る）" };
            if (isSei(mei, aite)) return { relation: "退気", feeling: "やや消耗（出しすぎ注意）" };
            
            const isKoku = (from, to) => (from==="木"&&to==="土") || (from==="土"&&to==="水") || (from==="水"&&to==="火") || (from==="火"&&to==="金") || (from==="金"&&to==="木");
            if (isKoku(aite, mei)) return { relation: "被剋", feeling: "抑圧（受け流す）" };
            if (isKoku(mei, aite)) return { relation: "剋出", feeling: "消耗（力まない）" };
            return { relation: "不明", feeling: "-" };
        }

        // 日付から「九星気学上の年・月」を算出（立春・節入り対応）
        function getKigakuDate(dateStr) {
            let [y, m, d] = dateStr.split('-').map(Number);
            const isBoundaryYear = [2021, 2025, 2029, 2033, 2037, 2041, 2045, 2049].includes(y);
            const risshunDay = isBoundaryYear ? 3 : 4;
            
            let kigakuYear = y;
            if (m === 1 || (m === 2 && d < risshunDay)) kigakuYear = y - 1;
            
            let kigakuMonth = m;
            let setsuri = (m === 2 || m === 3) ? risshunDay : 5; // 簡易節入り判定
            if (d < setsuri) kigakuMonth = m === 1 ? 12 : m - 1;
            
            return { kYear: kigakuYear, kMonth: kigakuMonth };
        }

        // 本命星の番号を取得
        function getHonmeiseiNum(birthDateStr) {
            const { kYear } = getKigakuDate(birthDateStr);
            return (11 - (kYear % 9)) % 9 || 9;
        }

        // 鑑定データを一括生成（年盤・月盤）
        function calculateKigakuData(birthDateStr) {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            const { kYear: targetY, kMonth: targetM } = getKigakuDate(todayStr);
            const meiNum = getHonmeiseiNum(birthDateStr);
            
            const Cy = (11 - (targetY % 9)) % 9 || 9; // 年盤の中宮
            
            const yEto = targetY % 12; // 月盤の中宮基準算出
            let baseMonthStar = [4, 7, 10, 1].includes(yEto) ? 8 : ([5, 8, 11, 2].includes(yEto) ? 5 : 2);
            const monthIndex = targetM >= 2 ? targetM - 2 : targetM + 10;
            const Cm = (baseMonthStar - monthIndex + 9) % 9 || 9;
            
            const getKaizaMiya = (C, S) => (C - S + 14) % 9 || 9; // 回座宮の公式
            const yearMiyaNum = getKaizaMiya(Cy, meiNum);
            const monthMiyaNum = getKaizaMiya(Cm, meiNum);
            
            const yearMiya = MIYA_INFO[yearMiyaNum];
            const monthMiya = MIYA_INFO[monthMiyaNum];
            const yearGogyo = getGogyoRelation(meiNum, yearMiyaNum);
            const monthGogyo = getGogyoRelation(meiNum, monthMiyaNum);
            
            const totalScore = (yearMiya.score * 0.625) + (monthMiya.score * 0.375);
            
            return {
                honmeisei: STAR_NAMES[meiNum],
                year: { miyaName: yearMiya.name, score: yearMiya.score, feeling: yearGogyo.feeling },
                month: { miyaName: monthMiya.name, score: monthMiya.score, feeling: monthGogyo.feeling },
                totalScore: totalScore.toFixed(1)
            };
        }

        // 簡易画数辞書（ひらがな・カタカナ・代表的な常用漢字を網羅。※辞書にない字は暫定で10画として処理）
        const STROKE_DICT = {
            1: "一乙", 2: "丁七乃九了二人入八力十十", 3: "下三千口土士夕大女子寸小山川工己干弓才之あいうえお",
            4: "不丑丹予互五井仁今介仏元公六内円化匹区反天夫太夭孔少尺屯巴幻木水火犬王竹糸耳虫かきくけこ",
            5: "石世主乏代令以付兄冬出加功包北半古右司四外央失奴尼左平氷申白皮目矢示禾穴立さしすせそ",
            6: "交亥亦亨休件任企伊吉安宇守州存光全共再各印向名合回好字地池老考血行羽西見角谷豆貝車走足身音たちつてと",
            7: "沙串佐体何作克児兵冷初判別利助努君告妥孝宏局尾希戒改更村条災男町社良見角谷豆貝車走足身音なにぬねの",
            8: "事侍佳使供依価典受味命和固国奈宗定宜実尚岸岩幸底店府弦彼念承明林東武歩直知長門金青雨非はひふへほ",
            9: "垣乗亭侯信保便前南厚咲城姿客室宣専屋度建春星昨昭是昼枯柄海神秋紅紀約美胃背草計飛食首香まみむめも",
            10: "修真高島倉原宮将座弱恵恩恭晃時書根流浩浪浦益神純納紗紡紘航記訓連軒酒針馬骨鬼やゆよわをん",
            11: "淳健側副務動勘商問唯国基堂堅宿崎崇張悠教望理産略異窓章細翌習脚脱脳船術被許責野鳥麻黄黒",
            12: "偉備割創勝博善喜営報場晴富尊就属復提滋賀渡登答結絶絡統絵覚訴貴買貸越超軽雄集順飲智",
            13: "働債傷傾僧勢勤嘆園嗣境夢奨寛幕幹廉微想意愛感豊路跳載農鉄電雷飾飽鼓",
            14: "像僕僚偽境増察旗暦滴漏演漫熊疑監精維網総緑練罰聞語認誓誤説読豪踊適",
            15: "璃儀億劇勲器震潔潜潤澄潮激賛賜輝輩輪遵養頼魅黙",
            16: "凝儒墾壁壇奮憲激濃燃頭機樹橋融親録鋼", 17: "優償厳繊聴臨謙購還鍛", 18: "曜織職観題",
            19: "覇鏡願警", 20: "競護響"
        };
        
        function getStrokeCount(char) {
            for (let strokes in STROKE_DICT) {
                if (STROKE_DICT[strokes].includes(char)) return parseInt(strokes);
            }
            // 辞書にない漢字が入力された場合、検証画面（F12）のコンソールに警告を出すようにしました
            console.warn(`【辞書登録なし】「${char}」が辞書に見つかりません。暫定で10画として計算します。`);
            return 10;
        }

        function getLuckInfo(strokes) {
            let s = strokes > 81 ? strokes % 80 : strokes;
            if (s === 0) s = 81;
            const luckTable = {
                "最大吉": [15, 16, 21, 23, 24, 31, 32, 33, 41, 52, 65, 67, 81],
                "大吉": [11, 35, 37, 39, 45, 47, 48, 63, 68],
                "吉": [3, 5, 6, 7, 8, 13, 17, 18, 25, 27, 29, 30, 38, 42, 43, 49, 51, 55, 57, 58, 61, 71, 73, 75, 77, 78],
                "凶": [2, 4, 9, 10, 12, 14, 19, 20, 22, 26, 28, 34, 36, 40, 44, 46, 50, 53, 54, 56, 59, 60, 62, 64, 66, 69, 70, 72, 74, 76, 79, 80]
            };
            for (let luck in luckTable) {
                if (luckTable[luck].includes(s)) return luck;
            }
            return "凶"; // フォールバック
        }

        function calculateSeimei(familyName, givenName) {
            const fStrokes = familyName.split('').map(getStrokeCount);
            const gStrokes = givenName.split('').map(getStrokeCount);
            const fTotal = fStrokes.reduce((a, b) => a + b, 0);
            const gTotal = gStrokes.reduce((a, b) => a + b, 0);
            
            // 熊崎式（1文字の場合は霊数「1」を足す）
            const ten = fStrokes.length === 1 ? fTotal + 1 : fTotal;
            const chi = gStrokes.length === 1 ? gTotal + 1 : gTotal;
            const jin = fStrokes[fStrokes.length - 1] + gStrokes[0];
            const sou = fTotal + gTotal;
            const gai = sou - jin === 0 ? 1 : sou - jin; // 例外処理

            return {
                tenkaku: { strokes: ten, luck: getLuckInfo(ten) },
                jinkaku: { strokes: jin, luck: getLuckInfo(jin) },
                chikaku: { strokes: chi, luck: getLuckInfo(chi) },
                gaikaku: { strokes: gai, luck: getLuckInfo(gai) },
                soukaku: { strokes: sou, luck: getLuckInfo(sou) }
            };
        }
        
        const parseName = (fullName) => {
            const parts = fullName.trim().split(/[\s ]+/); // スペースで姓名を分割
            if (parts.length > 1) return { family: parts[0], given: parts.slice(1).join("") };
            const famLen = fullName.length > 3 ? 2 : 1; // スペースがない場合の推測
            return { family: fullName.slice(0, famLen), given: fullName.slice(famLen) || "太郎" };
        };


        const Heart = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>;
        const User = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>;
        const Users = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>;
        const Sparkles = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>;
        const Settings = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3" strokeLinecap="round" strokeLinejoin="round"/></svg>;
        const ChevronDown = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>;
        const ChevronUp = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7"/></svg>;
        const ArrowRight = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>;
        const Loader2 = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="animate-spin"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>;
        const ArrowLeft = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l-7-7m7 7h18"/></svg>;
        const Download = ({className}) => <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>;

        const DEFAULT_MODELS = [
            { id: 0, key: "strength", label: "① 極限状態に対応可能な強度", description: "ピンチやトラブルに直面した時の、真の精神的タフネスを計測します。" },
            { id: 1, key: "karma", label: "② 前世からのカルマ（スピリチュアル）", description: "現世の行動から、引き継がれた宿命的な魂のテーマを浮き彫りにします。" },
            { id: 2, key: "fetish", label: "③ 無意識のフェティシズム", description: "隠された愛の価値観や、秘められた五感の欲望を優しく解き明かします。" },
            { id: 3, key: "psychopath", label: "④ サイコパス度チェック", description: "冷徹な合理性や心の裏側に潜むダークサイドの深度を測ります。" },
            { id: 4, key: "villain", label: "⑤ 究極の二択（悪人度）", description: "過酷な選択を迫られた時にあぶり出される、あなたのエゴイズム度。" }
        ];

        const INITIAL_PLAYER = { name: '', birthDate: '', gender: '女性', bloodType: 'A型' };

        const DEFAULT_SECRET_Q2 = "【重要：最高レベルの物欲・所有欲表現】展開や設問において、熱狂的なコレクターの渇望を描くように、理性を激しく揺さぶる圧倒的な「物欲」を刺激する情景描写を徹底してください。どうしても手に入らない限定品に対する焦燥、予算の限界を超えてでも手に入れた瞬間の背徳的な悦び、希少な素材や完璧なギミックに対する執狂的（フェティッシュ）な愛などを、極めて生々しく艶やかな比喩を用いて表現し、対象者の物欲の限界を試すような、極めて刺激的でスリリングな心理テストを作成してください。";
        const DEFAULT_SECRET_Q3 = "展開や設問において、高校生向けの青春小説のように、ドキドキするさわやかな少しエッチな情景描写を徹底してください。偶然、肌が触れ合った瞬間のドキドキ感、ふと瞬間に気になる相手の仕草、ささやかな相手に対するフェティッシュなどを、比喩を駆使して、すこし刺激的でスリリングな心理テストを作成してください。";
        const DEFAULT_SECRET_A2 = "【重要：最高レベルの物欲・フェティッシュ表現】分析やアドバイスにおいて、熱狂的なコレクターが理性を失うほどの渇望や、予算の限界を超えて希少なアイテムを手に入れる背徳的な悦びを、極めて生々しく艶やかなテキストで出力してください。対象者の魂の奥底に眠る、物に対する異常なまでの執着、ディテールや素材への狂気的（フェティッシュ）な愛、他者を排除してでも手に入れたいという絶対的な所有欲などを、官能的とも言える比喩を用いて限界まで暴き出し、極めて刺激的でマニアックに深掘りしてください。";
        const DEFAULT_SECRET_A3 = "分析やアドバイスには、大人の男女の艶やかな魅力や、肌が触れ合うような親密で官能的なニュアンスを必ず含めてください。深層心理を紐解く際、少し背徳的でロマンチックな表現を用いてください。";

        const NameJudgmentBoard = ({ data }) => {
            if (!data) return null;
            const KakuBadge = ({ title, item, colorClass }) => (
                <div className={`flex flex-col items-center bg-white border ${colorClass} rounded-xl p-2 w-full text-center shadow-sm relative z-10`}>

                    </div>

                    <div className="bg-[#fcfbf9] rounded-xl border border-gray-200 p-4 sm:p-6 flex justify-center items-stretch gap-3 sm:gap-5 overflow-x-auto">

                        <div className="flex flex-col items-center justify-between border-l border-r border-gray-300 px-4 sm:px-6 relative min-h-[180px] sm:min-h-[220px]">

                            <div className="w-16 sm:w-20 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                                <KakuBadge title="人格" item={data.jinkaku} colorClass="border-orange-200 bg-orange-50/40 shadow-md" />
                            </div>
                            <div className="text-2xl sm:text-3xl font-serif font-black text-gray-800 mb-2">{data.givenName}</div>
                        </div>

                        <div className="flex flex-col justify-between min-h-[180px] sm:min-h-[220px]">
                            <div className="w-16 sm:w-20"><KakuBadge title="天格" item={data.tenkaku} colorClass="border-green-200 bg-green-50/40" /></div>
                            <div className="w-16 sm:w-20"><KakuBadge title="地格" item={data.chikaku} colorClass="border-yellow-200 bg-yellow-50/40" /></div>
                        </div>

                        <div className="flex flex-col justify-center border-l border-gray-300 pl-3 sm:pl-5">
                            <div className="w-16 sm:w-20"><KakuBadge title="総格" item={data.soukaku} colorClass="border-rose-200 bg-rose-50/40" /></div>
                        </div>
                    </div>

                    <div className="space-y-2 mt-2">

            const handleBatchAnalyze = async () => {
                const targetKeys = Object.keys(stagedAnswers);

                setLoadingText('回答済みの全データを一括解析中...\n(項目数とテキスト量に比例して数十秒かかる場合があります)');

                let qaContext = "";

                    const data = stagedAnswers[key];
                    qaContext += `\n\n【対象テーマ（識別キー: ${key}）: ${data.modelLabel}】\n`;
                    const modelQs = preloadedQuestions[key];
                    modelQs.forEach((q, idx) => {
                        qaContext += `[問${idx+1}] ${q.questionText}\n${player1.name}の回答: ${data.p1[idx]}\n`;

                let eroticInstruction = "";

                const systemText = `あなたはスピリチュアルカウンセラーであり、鋭い洞察を持つ深層心理アナリストです。事前に提示される基本鑑定の宿命情報を踏まえた上で、今回の心理テスト回答から導き出されるリアルな深層分析を行ってください。${eroticInstruction}`;
                
                // ★修正箇所1: プロンプトに数値の厳格なルールを追加
                const prompt = `
■あらかじめ算出された基本宿命データ
${JSON.stringify(baseFortuneCache)}

■今回の心理テストにおける全回答データ（一括バッチ処理用）
${qaContext}

■分析指示（※配列内の全テーマに対して、以下の分析を絶対に省略せずフルボリュームで行うこと）
・各テーマごとに、P1とP2の回答の「ズレ」を特定し、そのズレが二人の関係性にどう作用するかを分析せよ。

${volumeInstruction}
${eroticInstruction}

【重要：各スコアの厳格な定義】

`;

                // ★修正箇所2: JSON Schema側にも「0〜100の整数」という説明(description)を付与
                const schema = {

                                                        <div>
                                                            <span className="font-bold text-gray-800 block">■ 深層心理:</span>
                                                            <p className="whitespace-pre-wrap">{item.psychologyResult}</p>
                                                        </div>
                                                        <div>
                                                            <span className="font-bold text-rose-600 block">■ アドバイス・改善プラン:</span>
                                                            <p className="whitespace-pre-wrap">{item.adviceResult}</p>
                                                        </div>
                                                        <button onClick={() => downloadTextResult(item)} className="mt-1 text-[10px] font-bold text-blue-500 flex items-center gap-1">
                                                            <Download className="w-3 h-3" /> この鑑定書を再DL
                                                        </button>
                                                    </div>
                                                </details>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {stage === 'admin' && (
                            <div className="fade-in space-y-5 bg-white p-5 rounded-2xl border border-gray-100 shadow-md">
                                <div className="border-b border-gray-100 pb-3 flex justify-between items-center">
                                    <h2 className="text-sm font-black tracking-wider text-gray-800 flex items-center">
                                        <Settings className="w-4 h-4 mr-1.5 text-gray-600" /> SYSTEM MASTER PANEL
                                    </h2>
                                    <button onClick={() => setStage(baseFortuneCache ? 'main' : 'input')} className="text-xs font-bold text-gray-500 hover:text-gray-900">
                                        閉じる
                                    </button>
                                </div>

                                <div className="space-y-1.5 p-3 bg-rose-50/50 rounded-xl border border-rose-100">
                                    <div className="flex justify-between items-center">
                                        <label className="block text-xs font-bold text-gray-600">シークレットモード</label>
                                        <span className="font-mono text-rose-600 font-bold text-xs">Lv.{eroticLevel}</span>
                                    </div>
                                    <input type="range" min="1" max="3" step="1" value={eroticLevel} onChange={e => setEroticLevel(parseInt(e.target.value))} className="w-full accent-rose-500" />
                                    <div className="flex justify-between text-[10px] text-gray-500 pt-0.5">
                                        <span>1: なし</span>
                                        <span>2: 少し</span>
                                        <span>3: 多め</span>
                                    </div>
                                    
                                    <details className="group mt-2 border-t border-rose-100/50 pt-2">
                                        <summary className="text-[10px] font-bold text-rose-500 cursor-pointer hover:text-rose-700 select-none flex items-center justify-between">
                                            <span>詳細プロンプト設定を展開</span>
                                            <ChevronDown className="w-3 h-3 group-open:hidden" />
                                            <ChevronUp className="w-3 h-3 hidden group-open:block" />
                                        </summary>
                                        <div className="space-y-3 pt-3">
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">質問生成文 (Level 2)</label>
                                                <textarea value={secretQLevel2} onChange={e => setSecretQLevel2(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">質問生成文 (Level 3)</label>
                                                <textarea value={secretQLevel3} onChange={e => setSecretQLevel3(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">解説生成文 (Level 2)</label>
                                                <textarea value={secretALevel2} onChange={e => setSecretALevel2(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">解説生成文 (Level 3)</label>
                                                <textarea value={secretALevel3} onChange={e => setSecretALevel3(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                        </div>
                                    </details>
                                </div>

                                <div className="space-y-2 pt-2">
                                    <label className="block text-xs font-bold text-gray-600 border-b border-gray-100 pb-1">5つの測定目的（モデル）の動的カスタマイズ</label>
                                    <div className="space-y-3 max-h-48 overflow-y-auto pr-1">
                                        {customModels.map((model, idx) => (
                                            <div key={model.id} className="p-2.5 bg-gray-50 rounded-xl border border-gray-100 space-y-1.5">
                                                <div className="flex items-center gap-1">
                                                    <span className="text-[10px] font-mono font-bold bg-gray-200 px-1 rounded">軸 {idx+1}</span>
                                                    <input type="text" value={model.label} onChange={e => {
                                                        const updated = [...customModels];
                                                        updated[idx].label = e.target.value;
                                                        setCustomModels(updated);
                                                    }} className="bg-white border border-gray-200 text-xs rounded px-2 py-0.5 flex-1 font-bold" />
                                                </div>
                                                <input type="text" value={model.description} onChange={e => {
                                                    const updated = [...customModels];
                                                    updated[idx].description = e.target.value;
                                                    setCustomModels(updated);
                                                }} className="w-full bg-white border border-gray-200 text-[10px] rounded px-2 py-0.5 text-gray-500" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 h-16 bg-transparent pointer-events-none z-50">
                        <div className="max-w-xl mx-auto h-full relative">
                            <div 
                                onMouseDown={handlePressStart}
                                onMouseUp={handlePressEnd}
                                onTouchStart={handlePressStart}
                                onTouchEnd={handlePressEnd}
                                className="absolute bottom-4 right-4 w-12 h-12 bg-gray-200/40 border border-gray-300/50 rounded-full flex items-center justify-center cursor-pointer select-none pointer-events-auto active:bg-gray-300 transition-all shadow-sm"
                                title="マスターパネルを開く（2秒長押し）"
                            >
                                <div className="w-2 h-2 bg-gray-400 rounded-full"></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const AuthWrapper = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passInput, setPassInput] = useState('');
            const SECRET_KEY = "1217"; // ★ここに好きな合言葉を設定してください！

            // 認証成功時は、これまで通り本体(App)を起動する
            if (isAuthenticated) {
                return <App />; 
            }

            // 認証前は、ログイン画面を表示する
            return (
                <div className="min-h-screen flex flex-col justify-center items-center p-6 bg-gray-50">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm text-center">
                        <Heart className="w-10 h-10 text-gray-800 mx-auto mb-4" />
                        <h1 className="text-xl font-black mb-2 text-gray-800 tracking-widest font-serif">SYNCHRONICITY</h1>
                        <p className="text-xs text-gray-500 mb-6 font-bold">アクセスには合言葉が必要です</p>
                        <input 
                            type="password" 
                            value={passInput} 
                            onChange={(e) => setPassInput(e.target.value)} 
                            placeholder="合言葉を入力" 
                            className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 mb-4 text-center focus:outline-none font-mono tracking-widest"
                            onKeyDown={(e) => {
                                if(e.key === 'Enter') {
                                    if(passInput === SECRET_KEY) setIsAuthenticated(true); 
                                    else alert('合言葉が違います');
                                }
                            }}
                        />
                        <button 
                            onClick={() => { if(passInput === SECRET_KEY) setIsAuthenticated(true); else alert('合言葉が違います'); }}
                            className="w-full bg-gray-900 text-white font-bold py-3.5 rounded-xl hover:bg-gray-800 transition-all text-sm"
                        >
                            認証して開始
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthWrapper />);
    </script>
</body>
</html>

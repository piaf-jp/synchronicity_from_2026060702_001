                            return (

                                </div>

        const DateInput = ({ value, onChange }) => {
            const handleInput = (e) => {
                let val = e.target.value.replace(/[^\d]/g, '');
                if (val.length > 8) val = val.slice(0, 8); 
                let formatted = val;
                if (val.length >= 5) {
                    formatted = val.slice(0, 4) + '-' + val.slice(4);
                }
                if (val.length >= 7) {
                    formatted = formatted.slice(0, 7) + '-' + val.slice(6);
                }
                onChange(formatted);
            };

            return (
                <input 
                    type="text" 
                    value={value} 
                    onChange={handleInput} 
                    placeholder="例: 19900101" 
                    className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm font-mono focus:outline-none focus:ring-1 focus:ring-gray-400 font-medium" 
                />
            );
        };

        function App() {
            const [stage, setStage] = useState('input');

            const [player2, setPlayer2] = useState({ ...INITIAL_PLAYER, gender: '男性', bloodType: 'O型' });

                    localStorage.removeItem('sync_api_key');
                    localStorage.removeItem('sync_api_model');
                }
            };

            const callGemini = async (prompt, systemText, schema) => {
                const activeKey = apiKey || ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${activeKey}`;
                const payload = {
                    contents: [{ role: 'user', parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemText }] },

                        temperature: parseFloat(temperature)

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)

                    const errorData = await res.json().catch(() => ({}));

${targetPrompt}

■ 出力トーンの好み: ${preferenceTone}

${playMode === 'couple' ? '二人それぞれの性質と、二人の相性診断を記述してください。' : '本人の性質を記述してください。'}

${customModels.map(m => `- ${m.key}: ${m.label} (${m.description})`).join('\n')}

                    type: "OBJECT",

                    },
                    required: ["playerName", "familyName", "givenName", "tenkaku", "jinkaku", "chikaku", "gaikaku", "soukaku"]

                const schema = {
                    type: "OBJECT",
                    properties: {
                        nameJudgments: { type: "ARRAY", items: judgmentSchema },
                        bloodTypeResult: { type: "STRING" },

                            type: "ARRAY",

                                    playerName: { type: "STRING", description: "対象者の名前" },

                                                    <label className="block text-xs font-bold text-gray-500 mb-1">性別</label>

                                                    </select>

                                                    <label className="block text-xs font-bold text-gray-500 mb-1">血液型</label>

                                                        <option>A型</option><option>B型</option><option>O型</option><option>AB型</option>

                                            <ChevronUp className="w-4 h-4 text-gray-400 hidden group-open:block" />

                                                            ))

                                                    <Download className="w-3.5 h-3.5" /> 基本鑑定データを保存
                                                </button>
                                            </div>
                                        </div>
                                    </details>
                                </div>

                                <div className="space-y-2">

                                        {customModels.map((model) => {

                                        <ArrowLeft className="w-4 h-4 mr-1.5" /> 基本情報の設定・入力画面に戻る

                                            {questions[currentQIndex]?.choices.map((choice, idx) => (
                                                <button key={idx} onClick={() => setSelectedAnswer(choice)} className={`w-full text-left p-3.5 rounded-xl text-xs border-2 transition-all font-medium ${selectedAnswer === choice ? 'border-gray-900 bg-gray-50 font-bold text-gray-900' : 'border-gray-100 bg-white hover:border-gray-200 text-gray-600'}`}>

                                            <span className={`text-[10px] font-bold px-2 py-1 rounded-full border ${getBadgeStyle(currentResult.player2Gender, false)}`}>

                                <div className="bg-white rounded-2xl p-5 border border-l-4 border-l-gray-800 border-gray-100 shadow-sm space-y-2">
                                    <h3 className="text-xs font-black tracking-wider text-gray-700 flex items-center border-b border-gray-50 pb-1.5">
                                        <Heart className="w-4 h-4 mr-1.5 text-gray-800" />心理テストによる深層心理分析
                                    </h3>
                                    <p className="text-xs text-gray-600 leading-relaxed whitespace-pre-wrap">{currentResult.psychologyResult}</p>
                                </div>

                                <div className="bg-white rounded-2xl p-5 border border-l-4 border-l-rose-400 border-gray-100 shadow-sm space-y-2">
                                    <h3 className="text-xs font-black tracking-wider text-rose-700 flex items-center border-b border-gray-50 pb-1.5">
                                        <Sparkles className="w-4 h-4 mr-1.5 text-rose-400" />スピリチュアル・アドバイス (改善策)
                                    </h3>
                                    <p className="text-xs text-gray-600 leading-relaxed whitespace-pre-wrap">{currentResult.adviceResult}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-3 pt-2">
                                    <button onClick={() => downloadTextResult(currentResult)} className="bg-white border border-gray-200 text-gray-700 font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-1.5 hover:bg-gray-50 transition-all">
                                        <Download className="w-4 h-4" /> 鑑定書を保存
                                    </button>
                                    <button onClick={() => setStage('main')} className="bg-gray-900 text-white font-bold py-3 rounded-xl text-xs hover:bg-gray-800 transition-all">
                                        ダッシュボードに戻る
                                    </button>
                                </div>
                            </div>
                        )}

                        {stage === 'history' && (
                            <div className="fade-in space-y-4">
                                <div className="flex items-center justify-between border-b border-gray-100 pb-3">
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setStage('main')} className="p-1 hover:bg-gray-100 rounded-lg transition-all">
                                            <ArrowLeft className="w-4 h-4 text-gray-600" />
                                        </button>
                                        <h2 className="text-sm font-bold text-gray-800">鑑定結果（履歴）一覧</h2>
                                    </div>
                                    {history.length > 0 && (
                                        <button onClick={downloadAllHistory} className="bg-gray-900 text-white font-bold py-1.5 px-3 rounded-lg text-[10px] flex items-center gap-1.5 hover:bg-gray-800 transition-all shadow-sm">
                                            <Download className="w-3 h-3" /> 一括保存
                                        </button>
                                    )}
                                </div>
                                
                                {history.length === 0 ? (
                                    <p className="text-xs text-gray-400 text-center py-12">まだ特化モデルの解析結果はありません。</p>
                                ) : (
                                    <div className="space-y-3">
                                        {history.map((item) => (
                                            <div key={item.id} className="bg-white rounded-xl p-4 border border-gray-100 shadow-sm space-y-2">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h4 className="text-xs font-bold text-gray-900">{item.modelLabel}</h4>
                                                        <span className="text-[10px] text-gray-400 font-mono">{item.date}</span>
                                                        {item.playMode === 'couple' && (
                                                            <div className="text-[10px] mt-1.5 flex gap-1">
                                                                <span className={`font-bold px-1.5 py-0.5 rounded border ${getBadgeStyle(item.player1Gender, true)}`}>
                                                                    P1: {item.player1Name} {item.p1Score}%
                                                                </span>
                                                                <span className={`font-bold px-1.5 py-0.5 rounded border ${getBadgeStyle(item.player2Gender, false)}`}>
                                                                    P2: {item.player2Name} {item.p2Score}%
                                                                </span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-[9px] font-black tracking-widest text-gray-400 mb-0.5">
                                                            {item.playMode === 'solo' ? '特化指標適合率' : '二人の化学反応（総合相性度）'}
                                                        </div>
                                                        <span className="text-xl font-black font-mono text-rose-500">{item.score}%</span>
                                                    </div>
                                                </div>
                                                <details className="group mt-1">
                                                    <summary className="text-[11px] font-bold text-gray-500 cursor-pointer hover:text-gray-800 select-none pt-1">
                                                        詳細な分析文を展開
                                                    </summary>
                                                    <div className="pt-2 mt-2 border-t border-gray-50 space-y-3 text-[11px] text-gray-600 leading-relaxed">
                                                        <div>
                                                            <span className="font-bold text-gray-800 block">■ 深層心理:</span>
                                                            <p className="whitespace-pre-wrap">{item.psychologyResult}</p>
                                                        </div>
                                                        <div>
                                                            <span className="font-bold text-rose-600 block">■ アドバイス・改善プラン:</span>
                                                            <p className="whitespace-pre-wrap">{item.adviceResult}</p>
                                                        </div>
                                                        <button onClick={() => downloadTextResult(item)} className="mt-1 text-[10px] font-bold text-blue-500 flex items-center gap-1">
                                                            <Download className="w-3 h-3" /> この鑑定書を再DL
                                                        </button>
                                                    </div>
                                                </details>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {stage === 'admin' && (
                            <div className="fade-in space-y-5 bg-white p-5 rounded-2xl border border-gray-100 shadow-md">
                                <div className="border-b border-gray-100 pb-3 flex justify-between items-center">
                                    <h2 className="text-sm font-black tracking-wider text-gray-800 flex items-center">
                                        <Settings className="w-4 h-4 mr-1.5 text-gray-600" /> SYSTEM MASTER PANEL
                                    </h2>
                                    <button onClick={() => setStage(baseFortuneCache ? 'main' : 'input')} className="text-xs font-bold text-gray-500 hover:text-gray-900">
                                        閉じる
                                    </button>
                                </div>

                                <div className="space-y-1">
                                    <label className="block text-xs font-bold text-gray-600">Gemini API Key</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type={showApiKey ? "text" : "password"} 
                                            value={apiKey} 
                                            onChange={e => setApiKey(e.target.value)} 
                                            placeholder="AI判定用のAPIキーを入力" 
                                            className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-mono focus:outline-none" 
                                        />
                                        <button onClick={() => setShowApiKey(!showApiKey)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 rounded-xl text-xs font-bold whitespace-nowrap transition-all">
                                            {showApiKey ? "隠す" : "表示"}
                                        </button>
                                        <button onClick={clearCache} className="bg-red-50 hover:bg-red-100 text-red-600 px-3 rounded-xl text-xs font-bold whitespace-nowrap transition-all">
                                            削除
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <label className="block text-xs font-bold text-gray-600">Gemini AI Model Engine</label>
                                    <input 
                                        type="text" 
                                        value={geminiModel} 
                                        onChange={e => setGeminiModel(e.target.value)} 
                                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-mono focus:outline-none" 
                                    />
                                </div>

                                <div className="space-y-1.5 p-3 bg-rose-50/50 rounded-xl border border-rose-100">
                                    <div className="flex justify-between items-center">
                                        <label className="block text-xs font-bold text-gray-600">シークレットモード</label>
                                        <span className="font-mono text-rose-600 font-bold text-xs">Lv.{eroticLevel}</span>
                                    </div>
                                    <input type="range" min="1" max="3" step="1" value={eroticLevel} onChange={e => setEroticLevel(parseInt(e.target.value))} className="w-full accent-rose-500" />
                                    <div className="flex justify-between text-[10px] text-gray-500 pt-0.5">
                                        <span>1: なし</span>
                                        <span>2: 少し</span>
                                        <span>3: 多め</span>
                                    </div>
                                    
                                    <details className="group mt-2 border-t border-rose-100/50 pt-2">
                                        <summary className="text-[10px] font-bold text-rose-500 cursor-pointer hover:text-rose-700 select-none flex items-center justify-between">
                                            <span>詳細プロンプト設定を展開</span>
                                            <ChevronDown className="w-3 h-3 group-open:hidden" />
                                            <ChevronUp className="w-3 h-3 hidden group-open:block" />
                                        </summary>
                                        <div className="space-y-3 pt-3">
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">質問生成文 (Level 2)</label>
                                                <textarea value={secretQLevel2} onChange={e => setSecretQLevel2(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">質問生成文 (Level 3)</label>
                                                <textarea value={secretQLevel3} onChange={e => setSecretQLevel3(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">解説生成文 (Level 2)</label>
                                                <textarea value={secretALevel2} onChange={e => setSecretALevel2(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="block text-[10px] font-bold text-gray-600">解説生成文 (Level 3)</label>
                                                <textarea value={secretALevel3} onChange={e => setSecretALevel3(e.target.value)} className="w-full bg-white border border-rose-200 rounded p-2 text-[10px] h-16 resize-none focus:outline-none focus:border-rose-400" />
                                            </div>
                                        </div>
                                    </details>
                                </div>

                                <div className="space-y-2 pt-2">
                                    <label className="block text-xs font-bold text-gray-600 border-b border-gray-100 pb-1">5つの測定目的（モデル）の動的カスタマイズ</label>
                                    <div className="space-y-3 max-h-48 overflow-y-auto pr-1">
                                        {customModels.map((model, idx) => (
                                            <div key={model.id} className="p-2.5 bg-gray-50 rounded-xl border border-gray-100 space-y-1.5">
                                                <div className="flex items-center gap-1">
                                                    <span className="text-[10px] font-mono font-bold bg-gray-200 px-1 rounded">軸 {idx+1}</span>
                                                    <input type="text" value={model.label} onChange={e => {
                                                        const updated = [...customModels];
                                                        updated[idx].label = e.target.value;
                                                        setCustomModels(updated);
                                                    }} className="bg-white border border-gray-200 text-xs rounded px-2 py-0.5 flex-1 font-bold" />
                                                </div>
                                                <input type="text" value={model.description} onChange={e => {
                                                    const updated = [...customModels];
                                                    updated[idx].description = e.target.value;
                                                    setCustomModels(updated);
                                                }} className="w-full bg-white border border-gray-200 text-[10px] rounded px-2 py-0.5 text-gray-500" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 h-16 bg-transparent pointer-events-none z-50">
                        <div className="max-w-xl mx-auto h-full relative">
                            <div 
                                onMouseDown={handlePressStart}
                                onMouseUp={handlePressEnd}
                                onTouchStart={handlePressStart}
                                onTouchEnd={handlePressEnd}
                                className="absolute bottom-4 right-4 w-12 h-12 bg-gray-200/40 border border-gray-300/50 rounded-full flex items-center justify-center cursor-pointer select-none pointer-events-auto active:bg-gray-300 transition-all shadow-sm"
                                title="マスターパネルを開く（2秒長押し）"
                            >
                                <div className="w-2 h-2 bg-gray-400 rounded-full"></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

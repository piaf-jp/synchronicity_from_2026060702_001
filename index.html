        // --- 画像リサイズ（解像度ダウン）＆圧縮ロジック ---
        // これを追加することで、スマホの巨大な写真をAI向けに最適化する
        const compressImage = (file, maxWidth = 1024, maxHeight = 1024, quality = 0.8) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        // アスペクト比を維持しつつ最大サイズに収める
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height *= maxWidth / width));
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width *= maxHeight / height));
                                height = maxHeight;
                            }
                        }

                        // Canvasを使って再描画（圧縮）
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // JPEGとして圧縮し、Base64文字列を取得
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        
                        // APIに送るためのプレフィックスを除去したBase64文字列
                        const base64Data = dataUrl.split(',')[1];
                        
                        resolve({ previewUrl: dataUrl, base64Data: base64Data });
                    };
                    img.onerror = (error) => reject(error);
                };
                reader.onerror = (error) => reject(error);
            });
        };

        // --- 鑑定ロジック ---
        const fetchHandReading = async (apiKey, base64Left, base64Right, modelId) => {

必ず以下のJSON Schemaに従ったJSONオブジェクトのみを出力してください。
\`\`\`json
{
  "status": "success",
  "metadata": { "score_total": 95 },
  "readings": {
    "general": { "title": "", "comment": "" },
    "lines": [ { "name": "", "left_meaning": "", "right_meaning": "", "overall": "" } ],
    "mounts": [ { "name": "", "meaning": "" } ],
    "lucky_signs": [ { "name": "", "found_on": "", "meaning": "" } ]
  },
  "insight": "",
  "advice_of_the_day": ""
}
\`\`\`
            `;

            const requestBody = {
                contents: [{ 
                    parts: [

                        { inline_data: { mime_type: "image/jpeg", data: base64Right } }

                headers: { "Content-Type": "application/json" },

            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);

            </div>
        );

        const App = () => {
            const [apiKey, setApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState("gemini-3.5-flash");
            const [isApiSet, setIsApiSet] = useState(false);
            
            // Fileオブジェクトではなく、圧縮済みのBase64文字列を保持するように変更
            const [leftImageBase64, setLeftImageBase64] = useState(null);
            const [rightImageBase64, setRightImageBase64] = useState(null);
            
            const [leftPreview, setLeftPreview] = useState(null);
            const [rightPreview, setRightPreview] = useState(null);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            
            const [isCheatSheetOpen, setIsCheatSheetOpen] = useState(false);
            const pressTimer = useRef(null);
            
            const leftInputRef = useRef(null);
            const rightInputRef = useRef(null);

            useEffect(() => {
                const savedKey = localStorage.getItem("syn_api_key");
                if (savedKey) { setApiKey(savedKey); setIsApiSet(true); }
                const savedModel = localStorage.getItem("syn_model");
                if (savedModel) setSelectedModel(savedModel);
            }, []);

            const saveSettings = () => { 
                if (apiKey) { 
                    localStorage.setItem("syn_api_key", apiKey); 
                    setIsApiSet(true); 
                    setIsSettingsOpen(false); 
                } 
            };

            // 画像が選択・撮影された時の処理
            const handleImage = async (e, side) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith("image/")) {
                    try {
                        // 【変更点】 ここで即座に圧縮を実行し、最適化された画像データを受け取る
                        // 最大1024pxに縮小され、AI送信用に軽くなる
                        const { previewUrl, base64Data } = await compressImage(file, 1024, 1024, 0.8);
                        
                        if (side === 'left') { 
                            setLeftImageBase64(base64Data); 
                            setLeftPreview(previewUrl); 
                        } else { 
                            setRightImageBase64(base64Data); 
                            setRightPreview(previewUrl); 
                        }
                        setError(null); // エラーがあればクリア
                    } catch (err) {
                        setError("画像の処理に失敗しました。もう一度撮影してください。");
                    }
                }
            };

            const runDiagnosis = async () => {
                if (!apiKey) { setIsSettingsOpen(true); return setError("APIキーを設定してください。"); }
                if (!leftImageBase64 || !rightImageBase64) return setError("両手の画像を撮影（またはアップロード）してください。");
                
                setLoading(true); 
                setError(null); 
                setResult(null);
                
                try {
                    // 【変更点】 既に圧縮済みのBase64データをAPIに直接渡す
                    const data = await fetchHandReading(apiKey, leftImageBase64, rightImageBase64, selectedModel);
                    setResult(data);
                    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
                } catch (err) { 
                    setError(`鑑定に失敗しました。(${err.message})`); 
                } finally { 
                    setLoading(false); 
                }
            };

            const runDemo = () => {
                setLoading(true); 
                setError(null); 
                setResult(null);
                setLeftPreview("https://upload.wikimedia.org/wikipedia/commons/f/f6/Hand_of_a_young_man.jpg");
                setRightPreview("https://upload.wikimedia.org/wikipedia/commons/f/f6/Hand_of_a_young_man.jpg");
                
                // デモ用のフラグ文字列
                setLeftImageBase64("demo"); 
                setRightImageBase64("demo");
                
                setTimeout(() => { 
                    setResult(demoData); 
                    setLoading(false); 
                    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
                }, 1500);
            };

            const handlePressStart = () => { 
                pressTimer.current = setTimeout(() => { setIsCheatSheetOpen(true); }, 2000); 
            };
            const handlePressEnd = () => { 
                if (pressTimer.current) { clearTimeout(pressTimer.current); } 
            };

            const ImageUploader = ({ side, preview, inputRef, title, desc }) => (
                <div onClick={() => inputRef.current.click()} className="flex-1 bg-white border-2 border-dashed border-slate-300 rounded-2xl p-4 group transition-all duration-300 hover:border-amber-400 hover:bg-slate-50 flex flex-col items-center justify-center min-h-[220px] cursor-pointer relative overflow-hidden shadow-sm">
                    {preview ? (
                        <img src={preview} className={`absolute inset-0 w-full h-full object-cover rounded-xl opacity-80 ${side === 'left' ? 'scale-x-[-1]' : ''}`} alt={`${title}のプレビュー`} /> 
                    ) : (
                        <div className="flex flex-col items-center z-10">
                            <div className="p-4 rounded-full bg-slate-100 mb-2">
                                <Icon name="Camera" className={`w-8 h-8 text-slate-400`} />
                            </div>
                            <p className="text-xs text-slate-400 font-bold">タップして撮影</p>
                        </div>
                    )}
                    <div className="relative z-10 text-center bg-white/90 p-3 rounded-lg border border-slate-200 backdrop-blur-md mt-auto shadow-sm">
                        <h3 className="font-bold text-amber-600">{title}</h3>
                        <p className="text-xs text-slate-500 mt-1">{desc}</p>
                    </div>
                    {/* capture="environment" により背面カメラを直接起動 */}
                    <input type="file" accept="image/*" capture="environment" ref={inputRef} onChange={(e) => handleImage(e, side)} className="hidden" />
                </div>
            );

            return (
                <div className="container mx-auto max-w-5xl p-4 md:p-8 relative min-h-screen">
                    {isCheatSheetOpen && <CheatSheetModal onClose={() => setIsCheatSheetOpen(false)} />}

                    <header className="flex justify-between items-center mb-8 pb-4 border-b border-slate-300">
                        <div className="flex items-center gap-3">
                            <Icon name="Sparkles" className="w-8 h-8 text-amber-500 animate-pulse" />
                            <h1 className="serif-font text-2xl font-bold tracking-wider text-slate-800">SYNCHRONICITY <span className="text-slate-500 text-lg">Ultimate</span></h1>
                        </div>
                        <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className={`p-2 bg-white rounded-full hover:bg-slate-100 shadow-sm transition border ${isApiSet ? 'text-emerald-600 border-emerald-300' : 'text-slate-400 border-slate-200'}`}>
                            <Icon name="Settings" className="w-6 h-6" />
                        </button>
                    </header>

                    {isSettingsOpen && (
                        <div className="bg-white rounded-xl p-6 mb-8 border border-slate-200 shadow-md animate-fadeIn relative z-20">
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800"><Icon name="KeyRound" className="w-5 h-5"/> API設定</h2>
                            <div className="flex gap-4 flex-col md:flex-row">
                                <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="Gemini API Key" className="flex-1 bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-slate-800 outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200" />
                                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)} className="bg-slate-50 border border-slate-300 rounded-lg px-4 py-2 text-slate-800 outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-200 cursor-pointer">
                                    <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
                                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                    <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                                </select>
                                <button onClick={saveSettings} className="bg-amber-500 hover:bg-amber-400 text-white font-bold px-6 py-2 rounded-lg transition-colors shadow-sm">保存</button>
                            </div>
                        </div>
                    )}

                    <main className="space-y-8">
                        <section className="glass rounded-3xl p-6 md:p-10 text-center relative z-10">
                            <h2 className="serif-font text-xl font-bold mb-6 text-slate-800">両手の掌が紡ぐ、究極の真理</h2>
                            <div className="flex flex-col md:flex-row gap-6 mb-8">
                                <ImageUploader side="left" preview={leftPreview} inputRef={leftInputRef} title="左手 (Left Hand)" desc="先天的宿命・生まれ持った才能" />
                                <ImageUploader side="right" preview={rightPreview} inputRef={rightInputRef} title="右手 (Right Hand)" desc="後天的運命・現在の状況と未来" />
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onClick={runDiagnosis} disabled={loading || !leftImageBase64 || !rightImageBase64} className={`px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-2 ${loading || !leftImageBase64 || !rightImageBase64 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-amber-400 to-amber-600 text-white hover:scale-105 transition-transform shadow-lg'}`}>
                                    {loading ? (
                                        <><div className="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> 魂を霊視中...</>
                                    ) : (
                                        <><Icon name="Sparkles" className="w-5 h-5"/> 究極鑑定を開始</>
                                    )}
                                </button>
                                {!result && (
                                    <button onClick={runDemo} disabled={loading} className="px-8 py-4 rounded-xl border-2 border-slate-300 text-slate-600 hover:bg-slate-100 transition-colors font-bold flex items-center justify-center gap-2 bg-white">
                                        <Icon name="Play" className="w-4 h-4"/> デモ結果を確認
                                    </button>
                                )}
                            </div>
                            {error && (
                                <div className="mt-6 p-4 rounded-lg bg-pink-50 border border-pink-200 text-pink-600 flex items-center justify-center gap-2 animate-fadeIn shadow-sm">
                                    <Icon name="X" className="w-5 h-5" />
                                    <p className="font-bold text-sm">{error}</p>
                                </div>
                            )}
                        </section>

                        {result && (
                            <section className="space-y-12 animate-fadeIn pb-20 relative z-10">
                                {/* 総評 */}
                                <div className="bg-white rounded-3xl p-8 border-t-4 border-amber-500 text-center relative overflow-hidden shadow-lg">
                                    <div className="absolute top-0 right-0 p-4 opacity-5"><Icon name="Sparkles" className="w-32 h-32 text-amber-500"/></div>
                                    <h3 className="text-amber-600 text-sm font-bold tracking-widest mb-2">GENERAL READING</h3>
                                    <h2 className="text-2xl md:text-3xl font-bold mb-6 text-slate-800">{result.readings.general.title}</h2>
                                    <p className="text-base md:text-lg text-slate-600 leading-relaxed max-w-3xl mx-auto">{result.readings.general.comment}</p>
                                </div>

                                {/* 幸運な手相7選 */}
                                {result.readings.lucky_signs && result.readings.lucky_signs.length > 0 && (
                                    <div>
                                        <h3 className="text-xl md:text-2xl font-bold mb-6 flex items-center gap-3 text-pink-600 border-b border-pink-200 pb-2"><Icon name="Star" className="w-6 h-6"/> 特別鑑定：奇跡の刻印</h3>
                                        <div className="grid md:grid-cols-2 gap-4">
                                            {result.readings.lucky_signs.map(sign => (
                                                <div key={sign.name} className="bg-white p-5 rounded-xl border border-pink-200 shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <h4 className="text-lg md:text-xl font-bold text-pink-600">{sign.name}</h4>
                                                        <span className="text-xs font-bold bg-pink-100 text-pink-700 px-3 py-1.5 rounded-full border border-pink-200">{sign.found_on}</span>
                                                    </div>
                                                    <p className="text-sm md:text-base text-slate-600 leading-relaxed">{sign.meaning}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* 八大線 */}
                                <div>
                                    <h3 className="text-xl md:text-2xl font-bold mb-6 flex items-center gap-3 text-emerald-600 border-b border-emerald-200 pb-2"><Icon name="CheckCircle" className="w-6 h-6"/> 八大線の統合解析</h3>
                                    <div className="space-y-6">
                                        {result.readings.lines.map(line => (
                                            <div key={line.name} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                                <h4 className="text-lg md:text-xl font-bold text-emerald-600 mb-4 flex items-center gap-2">
                                                    <div className="w-2 h-6 bg-emerald-500 rounded-full"></div>
                                                    {line.name}
                                                </h4>
                                                <div className="grid md:grid-cols-2 gap-4 mb-5">
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <p className="text-xs text-slate-500 mb-2 border-b border-slate-200 pb-1 font-bold">左手 (先天)</p>
                                                        <p className="text-sm text-slate-700 leading-relaxed">{line.left_meaning}</p>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <p className="text-xs text-slate-500 mb-2 border-b border-slate-200 pb-1 font-bold">右手 (後天)</p>
                                                        <p className="text-sm text-slate-700 leading-relaxed">{line.right_meaning}</p>
                                                    </div>
                                                </div>
                                                <div className="bg-emerald-50 p-4 rounded-lg border-l-4 border-emerald-500">
                                                    <p className="text-sm md:text-base font-bold text-emerald-800"><span className="text-emerald-600 mr-2">【賢者の断言】</span>{line.overall}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                {/* 八つの丘 */}
                                <div>
                                    <h3 className="text-xl md:text-2xl font-bold mb-6 flex items-center gap-3 text-indigo-600 border-b border-indigo-200 pb-2"><Icon name="CircleDot" className="w-6 h-6"/> 運命を蓄える「八つの丘」</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                                        {result.readings.mounts.map(mount => (
                                            <div key={mount.name} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                                <h4 className="text-base font-bold text-indigo-600 mb-2">{mount.name}</h4>
                                                <p className="text-xs md:text-sm text-slate-600 leading-relaxed">{mount.meaning}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 洞察と助言 */}
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-slate-50 p-6 md:p-8 rounded-3xl border border-slate-200 shadow-inner">
                                        <h3 className="text-base font-bold mb-4 text-slate-700 border-b border-slate-300 pb-2">深層心理への洞察</h3>
                                        <p className="text-slate-600 italic leading-relaxed text-sm md:text-base">"{result.insight}"</p>
                                    </div>
                                    <div className="bg-amber-50 p-6 md:p-8 rounded-3xl border border-amber-200 shadow-sm">
                                        <h3 className="text-base font-bold mb-4 text-amber-600 flex items-center gap-2 border-b border-amber-200 pb-2">
                                            <Icon name="Sparkles" className="w-5 h-5"/> 今日の絶対的指針
                                        </h3>
                                        <p className="text-base md:text-lg font-bold text-amber-800 leading-relaxed">{result.advice_of_the_day}</p>
                                    </div>
                                </div>
                            </section>
                        )}
                    </main>

                    {/* 秘伝の書（カンペ）ボタン */}
                    <button 
                        onMouseDown={handlePressStart} onMouseUp={handlePressEnd} onMouseLeave={handlePressEnd}
                        onTouchStart={handlePressStart} onTouchEnd={handlePressEnd}
                        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-white border border-slate-300 z-[90] flex items-center justify-center cursor-pointer select-none shadow-[0_4px_15px_rgba(0,0,0,0.15)] hover:shadow-[0_8px_25px_rgba(0,0,0,0.2)] hover:scale-110 transition-all duration-300"
                        title="秘伝の書 (2秒長押しで開く)"
                    >
                        <Icon name="BookOpen" className="w-6 h-6 text-slate-500" />
                    </button>
                    
                    <footer className="mt-16 text-center text-xs text-slate-500 pb-8 relative z-10">
                        <p>&copy; 2077 SYNCHRONICITY Ultimate.</p>
                        <p>The AI's decision is absolute.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
